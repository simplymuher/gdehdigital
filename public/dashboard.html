<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>GDEH Student Dashboard</title>

<style>

body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:15px;
  background:#ffffff;
  color:#0B1F4D;
  font-size:13px;
}

.header{
  position:relative;
  text-align:center;
  margin-bottom:10px;
}

.logo img{
  width:85px;
}

.logout-btn{
  position:absolute;
  top:5px;
  right:5px;
  text-decoration:none;
  font-size:20px;
  color:#0B1F4D;
}

h1{
  text-align:center;
  font-size:18px;
  margin:10px 0 15px;
  font-weight:600;
}

.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:6px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
}

.card h3{
  margin:0 0 8px;
  padding-bottom:5px;
  border-bottom:1px solid #f1f1f1;
  font-size:14px;
  color:#0B1F4D;
}

.card p{
  margin:4px 0;
  font-size:12px;
}

.unit-card{
  border:1px solid #ececec;
  border-radius:5px;
  padding:7px 9px;
  margin-bottom:5px;
  font-size:12px;
  background:#fafafa;
}

.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:8px;
}

.menu-card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:6px;
  padding:10px;
  text-align:center;
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
}

.menu-card span{
  display:block;
  margin-top:4px;
  font-size:12px;
  font-weight:bold;
}

.menu-card small{
  display:block;
  margin-top:2px;
  font-size:11px;
  color:#666;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#0B1F4D;
  color:#fff;
  padding:7px;
  text-align:left;
  font-size:12px;
}

td{
  border:1px solid #e5e7eb;
  padding:7px;
  font-size:12px;
}

tr:nth-child(even){
  background:#fafafa;
}

.remarks{
  color:red;
  font-weight:bold;
}
.btn-download{
  margin-top:10px;
  padding:8px 12px;
  background:#0B1F4D;
  color:#fff;
  border:none;
  border-radius:4px;
  font-size:12px;
  cursor:pointer;
}

.btn-download:hover{
  opacity:0.9;
}

.footer{
  margin-top:20px;
  text-align:center;
  font-size:11px;
  color:#0B1F4D;
}
</style>

</head>

<body>

<header class="header">

  <div class="logo">
    <img src="/gdeh_logo.png">
  </div>

  <a href="/logout" class="logout-btn">⎋</a>
</header>

<h1>GDEH STUDENT DASHBOARD</h1>

<div class="card">

  <h3>Student Details</h3>

  <p>
    <strong>Name:</strong>
    <span id="name"></span>
  </p>

  <p>
    <strong>Registration:</strong>
    <span id="reg"></span>
  </p>

  <p>
    <strong>Course:</strong>
    <span id="course"></span>
  </p>

</div>

<div class="card">

  <h3>Course Units</h3>

  <div id="unitsList"></div>

</div>
<div class="card">

  <h3>Results</h3>

  <table>
    <thead>
      <tr>
        <th>Code</th>
        <th>Unit</th>
        <th>Score</th>
        <th>Award</th>
         <th>Remarks</th>
         </tr>

          </thead>

    <tbody id="resultsBody"></tbody>

  </table>

  <button onclick="downloadResultPDF()" class="btn-download">
    Download Result PDF
  </button>



</div>

<div class="dashboard-grid">

  <div class="menu-card">
    
    <span>Fees Status</span>
    <small>Coming Soon</small>
  </div>

  <div class="menu-card">
   
    <span>Attendance</span>
    <small>Coming Soon</small>
  </div>

</div>

<footer class="footer">

  <p>
    © GARISSA DIGITAL EMPOWERMENT HUB CBO
  </p>

  <p>
    Student Portal | All Rights Reserved
  </p>

</footer>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script src="dashboard.js"></script>

</body>
</html>
