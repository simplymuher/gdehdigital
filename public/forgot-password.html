<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>

body{
background:white;
color:#0B1F4D;
font-family:Arial;
padding:20px;
}

.box{
max-width:500px;
margin:auto;
border:2px solid #0B1F4D;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(11,31,77,.2);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #0B1F4D;
}

button{
width:100%;
padding:12px;
background:#0B1F4D;
color:white;
border:none;
border-radius:30px;
}

</style>
</head>
<body>

<div class="box">

<h2>Forgot Password</h2>

<form id="forgotForm">

<input
type="text"
placeholder="Registration Number"
required
>

<input
type="email"
placeholder="Email Address"
required
>

<button>
Submit Request
</button>

</form>

</div>

<script src="forgot-password.js"></script>

</body>
</html>
