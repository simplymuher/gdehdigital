<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Registration Number</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#fff;
  margin:0;
  padding:20px;
  color:#0B1F4D;
}

.container{
  max-width:500px;
  margin:auto;
  text-align:center;
}

.logo img{
  width:90px;
}

h1{
  font-size:18px;
  margin-top:10px;
}

p{
  font-size:13px;
  margin-top:10px;
}

form{
  margin-top:15px;
  text-align:left;
}

label{
  font-size:13px;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:5px;
  font-size:13px;
}

button{
  margin-top:10px;
  width:100%;
  padding:10px;
  background:#0B1F4D;
  color:#fff;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.footer{
  margin-top:20px;
  font-size:11px;
  text-align:center;
  color:#0B1F4D;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="/gdeh_logo.png">
  </div>

  <h1>GARISSA DIGITAL EMPOWERMENT HUB CBO</h1>

  <p>
    Enter your email address.<br>
    A verification link will be sent<br>
    to recover your registration number.
  </p>

  <form id="forgotForm">

    <label>Email Address</label>
    <input
      type="email"
      id="email"
      placeholder="Enter your email"
      required
    >

    <button type="submit">
      Send Verification Link
    </button>

  </form>
<div id="message"></div>
</div>

<footer class="footer">
  © GDEH CBO | All Rights Reserved
</footer>

<script src="forgot-registration.js"></script>

</body>
</html>
