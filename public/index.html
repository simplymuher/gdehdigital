<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GDEH Student Portal</title>

<style>

body{
background:#ffffff;
color:#0B1F4D;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

.logo{
text-align:center;
margin-top:30px;
}

.logo img{
width:120px;
}

h1{
text-align:center;
}

.login-box{
max-width:450px;
margin:30px auto;
padding:25px;
border-radius:15px;
background:#fff;
border:2px solid #0B1F4D;
box-shadow:0 0 25px rgba(11,31,77,.25);
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #0B1F4D;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#0B1F4D;
color:#fff;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

a{
color:#0B1F4D;
text-decoration:none;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:40px;
}

</style>

</head>

<body>

<div class="logo">
<img src="/gdeh_logo.png">
</div>

<h1>GDEH Student Portal</h1>

<div class="login-box">

<form id="loginForm">

<input
type="text"
id="studentName"
placeholder="Full Name"
required
>

<input
type="text"
id="regNumber"
placeholder="Registration Number"
required
>

<label>

<input
type="checkbox"
id="rememberMe"
>

Remember Me

</label>

<br><br>

<button type="submit">
Login
</button>

</form>

<br>

<div style="text-align:center;">
<a href="/forgot_regNumber.html">
Forgot Registration Number?
</a>
</div>

</div>

<div class="footer">

<p>
© GDEH CBO Student Portal. All Rights Reserved.
</p>

<p>
Secure Management Systems
</p>

</div>

<script src="index.js"></script>

</body>
</html>
